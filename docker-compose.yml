version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aurora-db
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora_pass
      POSTGRES_DB: aurora_db
    ports:
      - "5432:5432"
    volumes:
      - aurora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aurora -d aurora_db" ]
      interval: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────
  backend:
    build: ./backend
    container_name: aurora-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://aurora:aurora_pass@postgres:5432/aurora_db
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "true"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/models:/app/models
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────
  frontend:
    build: ./frontend
    container_name: aurora-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  aurora_pgdata:
